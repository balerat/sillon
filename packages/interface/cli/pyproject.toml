[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "silloncli"
version = "0.1.0"
description = "The command line tool to access sillon logged data"
authors = [
  { name="Guillaume Tassotti", email="placeholder@email.com" },
  { name="Baptiste Lerat", email="placeholder@email.com" }
]
dependencies = [
  "rich",
  "tabulate",
  "silloncommon",
  "silloncore",
  "tqdm",
  "pytest",
]

[tool.setuptools.packages.find]
where = ["src"]
[project.scripts]
sillon = "silloncli.main:cli"
