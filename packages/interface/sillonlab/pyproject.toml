[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sillonlab"
version = "0.1.0"
description = "The analysis library to anaylze sillon data"
authors = [
  { name="Guillaume Tassotti", email="placeholder@email.com" },
  { name="Baptiste Lerat", email="placeholder@email.com" }
]
dependencies = [
  "rich",
  "tabulate",
  "silloncommon",
  "silloncore",
  "tqdm",
  "pytest",
  "toml",
  "numpy",
  "pandas",
]

[tool.setuptools.packages.find]
where = ["src"]
