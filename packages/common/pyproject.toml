[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "silloncommon"
version = "0.1.0"
authors = [
  { name="Guillaume Tassotti", email="placeholder@email.com" },
  { name="Baptiste Lerat", email="placeholder@email.com" }
]
description = "common lib for sillon project"
readme = "README.md"
requires-python = ">=3.13"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
  "sqlmodel",
  "SQLAlchemy",
  "pytest",
  "h5py",
  "names_generator"
]

[tool.setuptools.packages.find]
where = ["src"]

